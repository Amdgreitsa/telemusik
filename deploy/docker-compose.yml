services:
  api:
    build: ../backend
    env_file: ../backend/.env
    volumes:
      - /var/www/app/releases:/var/www/app/releases:ro
  web:
    build: ../website
    env_file: ../website/.env.local
  nginx:
    image: nginx:1.27
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/app/releases:/var/www/app/releases:ro
    depends_on:
      - api
      - web
